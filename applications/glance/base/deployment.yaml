apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: glance
  name: glance
  namespace: glance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glance
  template:
    metadata:
      labels:
        app: glance
    spec:
      imagePullSecrets:
        - name: harbor-credentials
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: glance
          image: harbor.okwilkins.dev/docker-hub-cache/glanceapp/glance:v0.8.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: proxy
              containerPort: 4180
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: glance-oidc-secret
                  key: client-secret-plaintext
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-cookie-secret
                  key: cookie-secret
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://auth.okwilkins.dev
            - --client-id=glance
            - --scope=openid profile email groups
            - --code-challenge-method=S256
            - --upstream=http://localhost:8080
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --redirect-url=https://feed.okwilkins.dev/oauth2/callback
            - --cookie-domain=.okwilkins.dev
            - --set-xauthrequest=true
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: glance-config
        - name: tmp
          emptyDir: {}
