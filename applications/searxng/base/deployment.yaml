apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: searxng
  name: searxng
  namespace: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      imagePullSecrets:
        - name: harbor-credentials
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 3000
      initContainers:
        - name: init-config
          image: busybox:latest
          command:
            - "sh"
            - "-c"
            - "cp /tmp/config/settings.yml /etc/searxng/settings.yml"
          volumeMounts:
            - name: config-source
              mountPath: /tmp/config
            - name: config-writable
              mountPath: /etc/searxng
      containers:
        - name: searxng
          image: harbor.okwilkins.dev/docker-hub-cache/searxng/searxng:2026.3.1-162c04a1c
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config-writable
              mountPath: /etc/searxng
            - name: limiter-config
              mountPath: /etc/searxng/limiter.toml
              subPath: limiter.toml
            - name: cache
              mountPath: /var/cache/searxng
            - name: tmp
              mountPath: /tmp
          env:
            - name: SEARXNG_BASE_URL
              value: "https://search.okwilkins.dev"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: SECRET
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config-source
          configMap:
            name: searxng-settings
        - name: config-writable
          emptyDir: {}
        - name: limiter-config
          configMap:
            name: searxng-limiter
        - name: cache
          persistentVolumeClaim:
            claimName: searxng-cache-pvc
        - name: tmp
          emptyDir: {}
