apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: searxng
  name: searxng
  namespace: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      imagePullSecrets:
        - name: harbor-credentials
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 3000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: harbor.okwilkins.dev/docker-hub-cache/busybox:1.37.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - "sh"
            - "-c"
            - "cp /tmp/config/settings.yml /etc/searxng/settings.yml"
          volumeMounts:
            - name: config-source
              mountPath: /tmp/config
            - name: config-writable
              mountPath: /etc/searxng
      containers:
        - name: searxng
          image: harbor.okwilkins.dev/docker-hub-cache/searxng/searxng:2026.3.1-162c04a1c
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config-writable
              mountPath: /etc/searxng
            - name: limiter-config
              mountPath: /etc/searxng/limiter.toml
              subPath: limiter.toml
            - name: cache
              mountPath: /var/cache/searxng
            - name: tmp
              mountPath: /tmp
          env:
            - name: SEARXNG_BASE_URL
              value: "https://search.okwilkins.dev"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: SECRET
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: proxy
              containerPort: 4180
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-oidc-secret
                  key: client-secret-plaintext
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-cookie-secret
                  key: cookie-secret
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://auth.okwilkins.dev
            - --client-id=searxng
            - --scope=openid profile email groups
            - --upstream=http://localhost:8080
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --redirect-url=https://search.okwilkins.dev/oauth2/callback
            - --cookie-domain=.okwilkins.dev
            - --set-xauthrequest=true
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config-source
          configMap:
            name: searxng-settings
        - name: config-writable
          emptyDir: {}
        - name: limiter-config
          configMap:
            name: searxng-limiter
        - name: cache
          persistentVolumeClaim:
            claimName: searxng-cache-pvc
        - name: tmp
          emptyDir: {}
