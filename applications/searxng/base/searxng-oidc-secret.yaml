apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng-oidc-secret
  namespace: searxng
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secretstore
    kind: ClusterSecretStore
  target:
    name: searxng-oidc-secret
    creationPolicy: Orphan
  data:
    - secretKey: client-secret-plaintext
      remoteRef:
        key: authelia/searxng-oidc
        property: client-secret-plaintext
