apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit-collector
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://fluent.github.io/helm-charts/
      chart: fluent-bit-collector
      targetRevision: 1.0.6
      helm:
        valueFiles:
          - $h8s/observability/fluent-bit/environments/prod/values.yaml
    - repoURL: https://github.com/okwilkins/h8s
      targetRevision: HEAD
      ref: h8s
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - PruneLast=true
      - ServerSideApply=true
