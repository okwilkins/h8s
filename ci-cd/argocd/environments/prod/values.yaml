# https://artifacthub.io/packages/helm/argo/argo-cd/8.0.0?modal=values

global:
  domain: argocd.okwilkins.dev
# Terminate SSL at ingress and let Cilium handle it past there
configs:
  params:
    server.insecure: true
  cm:
    url: https://argocd.okwilkins.dev
    admin.enabled: "false"
    oidc.config: |
      name: Authelia
      issuer: https://auth.okwilkins.dev
      clientID: argocd
      clientSecret: $argocd-oidc-secret:oidc.authelia.clientSecret
      cliClientID: argocd-cli
      requestedScopes:
        - openid
        - email
        - groups
      enableUserInfoGroups: true
      userInfoPath: /api/oidc/userinfo
  rbac:
    policy.csv: |
      g, admins, role:admin
controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
server:
  # As HTTPS is dealt with with Cloudflared, internally use HTTP
  extraArgs:
    - --insecure
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
redis:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
dex:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
notifications:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
