version: "3"
run: once

vars:
  STATES_DIR: "$INFRA_ROOT/states"

tasks:
  default:
    desc: "List all available tasks"
    cmds:
      - task --list

  # Talos Factory
  talos:factory:install:
    desc: "Generate Talos schematic with custom extensions"
    dir: '$INFRA_ROOT/00-talos-factory'
    cmds:
      - tofu init
      - tofu apply -auto-approve

  talos:factory:destroy:
    desc: "Destroy Talos factory schematic"
    dir: '$INFRA_ROOT/00-talos-factory'
    cmds:
      - tofu destroy -auto-approve

  # Proxmox ISO - Download Talos ISO to Proxmox nodes
  proxmox:iso:install:
    desc: "Download Talos ISO to Proxmox nodes"
    dir: '$INFRA_ROOT/01-proxmox-iso-upload'
    cmds:
      - tofu init
      - tofu apply -auto-approve

  proxmox:iso:destroy:
    desc: "Remove Talos ISO from Proxmox nodes"
    dir: '$INFRA_ROOT/01-proxmox-iso-upload'
    cmds:
      - tofu destroy -auto-approve

  # Proxmox Provision - Create VMs on Proxmox
  proxmox:provision:install:
    desc: "Create VMs on Proxmox"
    dir: '$INFRA_ROOT/02-proxmox-provision'
    cmds:
      - tofu init
      - tofu apply -auto-approve

  proxmox:provision:destroy:
    desc: "Destroy Proxmox VMs"
    dir: '$INFRA_ROOT/02-proxmox-provision'
    cmds:
      - tofu destroy -auto-approve

  # Talos Configure - Configure nodes, bootstrap etcd, retrieve kubeconfig
  talos:configure:install:
    desc: "Configure Talos nodes, bootstrap etcd, retrieve kubeconfig"
    dir: '$INFRA_ROOT/03-talos-configure'
    cmds:
      - tofu init
      - tofu apply -auto-approve

  talos:configure:destroy:
    desc: "Destroy Talos configuration and nodes"
    dir: '$INFRA_ROOT/03-talos-configure'
    cmds:
      - tofu destroy -auto-approve

  # Cilium - Install Cilium CNI
  cilium:install:
    desc: "Install Cilium CNI"
    dir: '$INFRA_ROOT/04-cilium'
    cmds:
      - tofu init
      - tofu apply -auto-approve

  cilium:destroy:
    desc: "Destroy Cilium CNI installation"
    dir: '$INFRA_ROOT/04-cilium'
    cmds:
      - tofu destroy -auto-approve

  # ArgoCD - Install ArgoCD for GitOps
  argocd:install:
    desc: "Install ArgoCD for GitOps"
    dir: '$INFRA_ROOT/05-argocd'
    cmds:
      - tofu init
      - tofu apply -auto-approve

  argocd:destroy:
    desc: "Destroy ArgoCD installation"
    dir: '$INFRA_ROOT/05-argocd'
    cmds:
      - tofu destroy -auto-approve

  # Vault Init - Initialise Vault outputs for helper scripts
  vault:init:
    desc: "Initialise Vault (create outputs and run bootstrap)"
    dir: '$INFRA_ROOT/06-vault-init'
    cmds:
      - tofu init
      - tofu apply -auto-approve

  vault:destroy:
    desc: "Destroy Vault outputs"
    dir: '$INFRA_ROOT/06-vault-init'
    cmds:
      - tofu destroy -auto-approve

  # Vault Secrets - Provision secrets in Vault
  vault:secrets:install:
    desc: "Provision all secrets in Vault (passwords, keys, external secrets)"
    dir: '$INFRA_ROOT/07-vault-resources-provision'
    cmds:
      - tofu init
      - tofu apply -auto-approve

  vault:secrets:destroy:
    desc: "Destroy Vault secrets (secrets remain in Vault, only Terraform state removed)"
    dir: '$INFRA_ROOT/07-vault-resources-provision'
    cmds:
      - tofu destroy -auto-approve

  # Composite tasks
  cluster:bootstrap:
    desc: "Run all bootstrap stages in sequence"
    cmds:
      - task: talos:factory:install
      - task: proxmox:iso:install
      - task: proxmox:provision:install
      - task: talos:configure:install
      - task: cilium:install
      - task: argocd:install
      - task: vault:init
      - task: vault:secrets:install

  cluster:destroy:
    desc: "Destroy all resources in reverse order"
    cmds:
      - task: proxmox:provision:destroy
      - task: proxmox:iso:destroy
      - task: talos:factory:destroy

  # Utility tasks
  clean:states:
    desc: "Remove all Terraform state files (DANGEROUS - destroys all state!)"
    cmds:
      - rm -rf {{.STATES_DIR}}
      - echo "State files removed. You will need to re-run cluster:bootstrap to recreate the cluster."

  clean:all:
    desc: "Destroy all resources and remove state files (COMPLETE RESET)"
    cmds:
      - task: cluster:destroy
      - task: clean:states
