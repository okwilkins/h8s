apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mazanoke
  namespace: mazanoke
spec:
  parentRefs:
    - name: default-gateway
      namespace: default
    - name: cloudflare-gateway
      namespace: cloudflare
  hostnames:
    - optimize.okwilkins.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mazanoke
          port: 80
