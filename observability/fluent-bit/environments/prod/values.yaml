# https://artifacthub.io/packages/helm/fluent/fluent-bit-collector/1.0.6?modal=values

luaScripts:
  audit.lua: |
    function set_message(tag, timestamp, record)
        if record["verb"] and record["requestURI"] then
            record["log"] = record["verb"]:upper() .. " " .. record["requestURI"]
        end
        return 1, timestamp, record
    end

config:
  pipeline:
    inputs:
      - name: tail
        path: /var/log/audit/kube/*.log
        tag: audit.*
        parser: json
        skip_long_lines: true
        refresh_interval: 5
        mem_buf_limit: 5MB
        read_from_head: false

    filters:
      - name: lua
        match: audit.*
        call: set_message
        script: /fluent-bit/scripts/audit.lua

    outputs:
      - name: http
        match: "*"
        host: victoria-logs-victoria-logs-single-server.monitoring.svc.cluster.local
        port: 9428
        uri: /insert/jsonline
        format: json_lines
        json_date_key: time
        json_date_format: iso8601
        header:
          - VL-Stream-Fields stream
          - VL-Msg-Field log
          - VL-Time-Field time

serviceMonitor:
  enabled: true

podSecurityContext:
  runAsNonRoot: false
  fsGroup: 0
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsUser: 0
  runAsGroup: 0
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: false
  capabilities:
    drop:
      - ALL
    add:
      - DAC_READ_SEARCH

hostVolumes:
  - name: machine-id
    hostPath:
      path: /etc/machine-id
      type: File
    mountPath: /etc/machine-id
  - name: logs
    hostPath:
      path: /var/log
      type: Directory
    mountPath: /var/log
  - name: audit-logs
    hostPath:
      path: /var/log/audit/kube
      type: DirectoryOrCreate
    mountPath: /var/log/audit/kube

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 1Gi

dashboards:
  enabled: true
