apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    server:
      domain: "grafana.okwilkins.dev"
      root_url: "https://%(domain)s/"
    auth.generic_oauth:
      enabled: "true"
      name: Authelia
      icon: signin
      client_id: grafana
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email groups
      empty_scopes: "false"
      auth_url: https://auth.okwilkins.dev/api/oidc/authorization
      token_url: https://auth.okwilkins.dev/api/oidc/token
      api_url: https://auth.okwilkins.dev/api/oidc/userinfo
      role_attribute_path: contains(groups[*], 'admins') && 'Admin' || 'Viewer'
      allow_sign_up: "false"
      use_pkce: "true"
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: GF_SECURITY_ADMIN_USER
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: GF_SECURITY_ADMIN_PASSWORD
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: authelia-grafana-client-secret
                      key: client-secret-plaintext
