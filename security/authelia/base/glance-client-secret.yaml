apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-glance-client-secret
  namespace: authelia
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secretstore
    kind: ClusterSecretStore
  target:
    name: authelia-glance-client-secret
    creationPolicy: Orphan
  data:
    - secretKey: client-secret-hash
      remoteRef:
        key: authelia/glance-oidc
        property: client-secret-hash
