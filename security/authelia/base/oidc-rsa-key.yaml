apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-oidc-rsa-key
  namespace: authelia
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secretstore
    kind: ClusterSecretStore
  target:
    name: authelia-oidc-rsa-key
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: oidc-rsa-key
      remoteRef:
        key: authelia/oidc-rsa-key
        property: rsa-private-key
