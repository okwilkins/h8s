image:
  registry: harbor.okwilkins.dev/ghcr-cache
  pullSecrets:
    - harbor-credentials

secret:
  additionalSecrets:
    authelia-encryption-key: {}
    cnpg-authelia-prod-app-user-credentials: {}
    authelia-session-secret: {}
    authelia-hmac-secret: {}
    authelia-oidc-rsa-key: {}
    authelia-grafana-client-secret: {}

pod:
  kind: Deployment
  replicas: 1
  securityContext:
    pod:
      fsGroup: 1000
    container:
      runAsUser: 1000
      runAsGroup: 1000
  initContainers:
    - name: setup-users-database
      image: harbor.okwilkins.dev/docker-hub-cache/busybox:1.37.0
      securityContext:
        runAsUser: 0
      command:
        - /bin/sh
        - -c
        - |
          PASSWORD_HASH=$(cat /tmp/password/hash)
          sed "s#PASSWORD_PLACEHOLDER#$PASSWORD_HASH#" /tmp/users_template/users_template.yml > /config/users_database.yml
          chown 1000:1000 /config/users_database.yml
          chmod 644 /config/users_database.yml
          echo "Users database created successfully"
      volumeMounts:
        - name: user-password
          mountPath: /tmp/password
          readOnly: true
        - name: users-template
          mountPath: /tmp/users_template
          readOnly: true
        - name: users-config
          mountPath: /config
  extraVolumes:
    - name: user-password
      secret:
        secretName: authelia-user-password
    - name: users-template
      configMap:
        name: authelia-users-template
    - name: users-config
      emptyDir: {}
    - name: oidc-rsa-key
      secret:
        secretName: authelia-oidc-rsa-key
    - name: grafana-client-secret
      secret:
        secretName: authelia-grafana-client-secret
  extraVolumeMounts:
    - name: users-config
      mountPath: /config
    - name: oidc-rsa-key
      mountPath: /secrets/oidc-rsa-key
      readOnly: true
    - name: grafana-client-secret
      mountPath: /secrets/grafana-client-secret
      readOnly: true

# https://github.com/authelia/authelia/blob/v4.39.16/config.template.yml
configMap:
  log:
    level: info
  theme: auto

  # TODO: Add metrics
  # telemetry:

  webauthn:
    disable: false
    display_name: 'Authelia'
    enable_passkey_login: true

  server:
    endpoints:
      authz:
        ext-authz:
          implementation: "ExtAuthz"

  authentication_backend:
    file:
      enabled: true
      path: /config/users_database.yml

  session:
    encryption_key:
      disabled: false
      secret_name: authelia-session-secret
      path: session-secret
    cookies:
      - domain: okwilkins.dev

  notifier:
    filesystem:
      enabled: true
      filename: /config/notification.txt

  access_control:
    default_policy: two_factor
    rules:
      - domain: "*.okwilkins.dev"
        policy: two_factor

  identity_providers:
    oidc:
      hmac_secret:
        disabled: false
        secret_name: authelia-hmac-secret
        path: hmac-secret
      jwks:
        - key_id: default-rsa-key
          algorithm: RS256
          use: sig
          key: "{{ secret '/secrets/oidc-rsa-key/rsa-private-key' | mindent 10 '|' | msquote }}"
      clients:
        - client_id: grafana
          client_name: Grafana
          client_secret: "$plaintext${{ secret '/secrets/grafana-client-secret/client-secret-hash' }}"
          public: false
          authorization_policy: two_factor
          redirect_uris:
            - https://grafana.okwilkins.dev/login/generic_oauth
          scopes:
            - openid
            - profile
            - email
            - groups

  storage:
    local:
      enabled: false
    postgres:
      enabled: true
      address: 'tcp://cnpg-authelia-prod-rw.authelia.svc.cluster.local:5432'
      database: authelia
      username: authelia
      password:
        disabled: false
        secret_name: cnpg-authelia-prod-app-user-credentials
        path: password
    encryption_key:
      disabled: false
      secret_name: authelia-encryption-key
      path: encryption-key
