apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-authelia-prod-app-user-credentials
  namespace: authelia
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secretstore
    kind: ClusterSecretStore
  target:
    name: cnpg-authelia-prod-app-user-credentials
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: cnpg/cnpg-authelia-prod-app-user-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: cnpg/cnpg-authelia-prod-app-user-credentials
        property: password
